name: ai_assistant
description: "AI Assistant Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.0.5

  # 🔥 UPDATED (ONLY THESE CHANGED)
  firebase_core: ^3.6.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.4.0

  google_sign_in: ^6.1.6

  shared_preferences: ^2.2.2
  http: ^1.6.0
  flutter_svg: ^2.0.9
  avatar_glow: ^3.0.1

  # 🔥 KEEP (NOW COMPATIBLE)
  speech_to_text: ^7.3.0
  flutter_tts: ^3.8.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/logo.png"